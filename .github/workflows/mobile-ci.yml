name: TriPro Mobile CI/CD

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: 🧪 Test & Lint
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Run Lint
        run: npm run lint

      - name: ⌨️ Check Types
        run: npm run type-check

  build-android:
    name: 📱 Build Android APK
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔧 Inject environment variables
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
        run: |
          if [ -z "$EXPO_PUBLIC_API_URL" ]; then
            echo "::warning::EXPO_PUBLIC_API_URL secret is missing! App will fall back to default IP."
            # Optional: provide a fallback here if you want to force a specific IP in CI
            echo "EXPO_PUBLIC_API_URL=http://129.159.159.142:8080" > .env
          else
            echo "EXPO_PUBLIC_API_URL=${EXPO_PUBLIC_API_URL}" > .env
            echo "Successfully injected API URL from secrets."
          fi
          cat .env | sed 's/=.*/=******/'

      - name: 🏗 Prebuild Native Files
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
        run: npx expo prebuild --platform android --non-interactive --clean

      - name: 🔐 Enable Cleartext (HTTP) Support
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            # Add usesCleartextTraffic="true" to the <application> tag if not already present
            if ! grep -q "android:usesCleartextTraffic" "$MANIFEST"; then
              sed -i 's/<application/<application android:usesCleartextTraffic="true"/' "$MANIFEST"
              echo "Manually enabled Cleartext Traffic in AndroidManifest.xml"
            fi
          fi

      - name: 🏗 Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 🚀 Build Release APK
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
        run: |
          cd android
          ./gradlew clean
          ./gradlew assembleRelease --stacktrace --no-daemon
          echo "Built APK at: $(date)"
          ls -lh app/build/outputs/apk/release/
          cp app/build/outputs/apk/release/*.apk ../TriPro-Android-Release.apk

      - name: 📦 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TriPro-Android-APK-${{ github.run_number }}-${{ github.sha }}
          path: TriPro-Android-Release.apk
          retention-days: 7

  build-ios:
    name: 🍎 Build iOS (Simulator)
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'
    runs-on: macos-latest
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗 Prebuild Native Files
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
        run: npx expo prebuild --platform ios --non-interactive

      - name: 📦 Restore Pods Cache
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: 📦 Install CocoaPods
        run: |
          cd ios
          pod install

      - name: 🚀 Build iOS App (Simulator)
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
        run: |
          xcodebuild -workspace ios/*.xcworkspace \
            -scheme TriPro \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath build
          cp -r build/Build/Products/Release-iphonesimulator/TriPro.app ./TriPro-iOS-Simulator.app

      - name: 📦 Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TriPro-iOS-Simulator
          path: TriPro-iOS-Simulator.app
