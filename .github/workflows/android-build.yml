name: TriPro Mobile CI/CD

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: 🧪 Test & Lint
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🔍 Run Lint
        run: npm run lint

      - name: ⌨️ Check Types
        run: npm run type-check

  build-android:
    name: 📱 Build Android APK
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 🏗 Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🏗 Prebuild Native Files
        run: npx expo prebuild --platform android --non-interactive

      - name: 🚀 Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: 📦 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tripro-release-apk
          path: mobile_dev/android/app/build/outputs/apk/release/app-release-unsigned.apk
